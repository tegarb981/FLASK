<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Demo Flask-SQLAlchemy dan SQLite</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">


</head>

<body>

<div class="container">
    <div class="card">


    <h2>📚 Demo Flask-SQLAlchemy dan SQLite</h2>

    <div class="text-center mt-3">
        <a href="{{ url_for('tambah') }}"
           class="btn btn-primary">
            + Tambah Data
        </a>
    </div>

    <br>

    <table>
        <tr>
            <th>ID</th>
            <th>Judul</th>
            <th>Penulis</th>
            <th>Penerbit</th>
            <th>Ubah</th>
            <th>Hapus</th>
        </tr>

        {% for buku in container %}
        <tr>
            <td>{{ buku.id }}</td>
            <td>{{ buku.judul }}</td>
            <td>{{ buku.penulis }}</td>
            <td>{{ buku.penerbit }}</td>

            <td>
                <a href="/ubah/{{ buku.id }}"
                   class="btn btn-warning">
                    Ubah
                </a>
            </td>

            <td>
                <a href="/hapus/{{ buku.id }}"
                   class="btn btn-danger"
                   onclick="return konfirmasiHapus('{{ buku.id }}')">
                    Hapus
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
